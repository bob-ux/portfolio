<header class="site-header">
  <div class="container">
    <div class="nav">
      <!-- Brand -->
      <a class="brand" href="/">
        <img src="/assets/img/logo.svg" alt="Logo" class="brand-logo">

        <div class="brand-text">
          <strong>Портфолио</strong>
          <span>Senior UX/UI Designer • Fintech • Dashboards • Design systems</span>
        </div>
      </a>

      <!-- Desktop navigation -->
      <nav class="navlinks navlinks-desktop" aria-label="Навигация">
        <a href="/#cases">Кейсы</a>
        <a href="/other-projects/">Другие проекты</a>
        <a href="/#contact">Контакты</a>
      </nav>

      <!-- Actions -->
      <div class="nav-actions">
        <!-- Theme switch -->
        <button
          class="theme-switch"
          type="button"
          aria-label="Переключить тему"
          aria-pressed="false">
          <span class="switch-track" aria-hidden="true">
            <span class="switch-thumb" aria-hidden="true"></span>
          </span>
        </button>

        <!-- Mobile menu toggle -->
        <button
          class="menu-toggle"
          type="button"
          aria-label="Открыть меню"
          aria-expanded="false"
          aria-controls="mobile-menu">
          <span class="burger" aria-hidden="true"></span>
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="mobile-menu" hidden>
      <nav class="mobile-links" aria-label="Навигация (мобильная)">
        <a href="/#cases" class="mobile-link">Кейсы</a>
        <a href="/other-projects/" class="mobile-link">Другие проекты</a>
        <a href="/#contact" class="mobile-link">Контакты</a>
      </nav>
    </div>
  </div>
</header>
