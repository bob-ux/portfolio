<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact block prototype</title>
  <link rel="stylesheet" href="../css/styles.css?v=20260619-about-process">
  <style>
    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:var(--space-5) var(--space-3);
      padding-top:var(--space-5);
    }

    .prototype-theme{
      position:fixed;
      top:var(--space-3);
      right:var(--space-3);
      z-index:10;
    }

    .contact-prototype{
      display:grid;
      grid-template-columns:minmax(0, 1fr) minmax(
        calc(var(--space-8) + var(--space-8)),
        calc(var(--space-8) + var(--space-8) + var(--space-8))
      );
      align-items:center;
      gap:clamp(var(--space-4), 7vw, calc(var(--space-7) + var(--space-2)));
      width:min(100%, calc(var(--container) - var(--space-7) - var(--space-8)));
      min-height:calc(var(--space-8) + var(--space-8) + var(--space-8));
      padding:clamp(var(--space-5), 6vw, var(--space-7)) clamp(var(--space-5), 7vw, var(--space-7));
      overflow:hidden;
      border-radius:calc(var(--space-8) + var(--space-8));
      background:var(--card-muted);
    }

    .contact-prototype__copy{
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:var(--space-3);
      min-width:0;
    }

    .contact-prototype .section-title{
      margin-bottom:0;
    }

    .contact-prototype__photo{
      justify-self:end;
      width:clamp(
        calc(var(--space-8) + var(--space-7)),
        27vw,
        calc(var(--space-8) + var(--space-8) + var(--space-8))
      );
      aspect-ratio:1;
      overflow:hidden;
      border-radius:50%;
      background:var(--card);
    }

    .contact-prototype__photo img{
      display:block;
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center bottom;
    }

    @media (max-width: 820px){
      .contact-prototype{
        grid-template-columns:1fr;
        justify-items:center;
        gap:var(--space-4);
        width:min(100%, calc(var(--space-8) + var(--space-8) + var(--space-8) + var(--space-8) + var(--space-8)));
        min-height:0;
        padding:var(--space-4);
        border-radius:var(--radius);
        text-align:center;
      }

      .contact-prototype__copy{
        align-items:center;
        gap:var(--space-3);
        order:2;
      }

      .contact-prototype__photo{
        justify-self:center;
        order:1;
        width:min(68vw, calc(var(--space-8) + var(--space-8) + var(--space-5)));
      }
    }

    @media (max-width: 480px){
      .contact-prototype{
        padding:var(--space-3);
      }

      .contact-prototype__photo{
        width:min(72vw, calc(var(--space-8) + var(--space-8)));
      }
    }
  </style>
</head>
<body>
  <button class="theme-switch prototype-theme" type="button" aria-label="Переключить тему" aria-pressed="false">
    <span class="switch-track" aria-hidden="true">
      <span class="switch-thumb"></span>
    </span>
  </button>

  <section class="contact-prototype" aria-labelledby="contact-title">
    <div class="contact-prototype__copy">
      <div class="section-title">
        <h2 id="contact-title">Давайте работать вместе</h2>
      </div>
      <a class="btn primary" href="https://t.me/Forpik2_0" target="_blank" rel="noreferrer">Связаться</a>
    </div>

    <div class="contact-prototype__photo" aria-hidden="true">
      <img src="file:///C:/Users/Artem/Downloads/4_5.webp" alt="">
    </div>
  </section>
  <script>
    const root = document.documentElement;
    const themeButton = document.querySelector(".theme-switch");
    const savedTheme = localStorage.getItem("theme");
    const initialTheme =
      savedTheme === "light" || savedTheme === "dark"
        ? savedTheme
        : "light";

    function applyTheme(theme){
      root.setAttribute("data-theme", theme);
      themeButton.setAttribute("aria-pressed", String(theme === "dark"));
      localStorage.setItem("theme", theme);
    }

    applyTheme(initialTheme);

    themeButton.addEventListener("click", () => {
      const currentTheme = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
      applyTheme(currentTheme === "dark" ? "light" : "dark");
    });
  </script>
</body>
</html>
